kind = "web"
previewPath = "/"
title = "Alba García Santillana - Psicología"
version = "1.0.0"
id = "artifacts/psicologia-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25383

[services.development]
run = "pnpm --filter @workspace/psicologia-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/psicologia-web", "run", "build" ]
publicDir = "artifacts/psicologia-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25383"
BASE_PATH = "/"
